repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: ["--config-file=pyproject.toml"]
        additional_dependencies:
          - "fastapi>=0.115"
          - "sqlalchemy>=2.0.36"
          - "pydantic>=2.9"
          - "pydantic-settings>=2.6"
          - "pytest>=8.3"
          - "httpx>=0.28"
          - "mcp>=1.2"
